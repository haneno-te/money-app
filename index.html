<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>money-app</title>
  <style>
    /* ====== ダークテーマ：デザイントークン（kake-bo-app トーン）====== */
    :root {
      color-scheme: dark;

      --bg: #0c1018;
      --surface: #1c2333;
      --surface-elev: #242b3d;
      --border: #2c3447;

      --text: #e6e8ee;
      --text-dim: #8a93a8;
      --text-muted: #6a7388;

      --income: #4cd380;
      --expense: #ff5e5e;
      --unpaid: #ff9a4d;
      --primary: #5b9eff;
      --accent-purple: #a47bff;

      --income-soft:  rgba(76, 211, 128, 0.14);
      --expense-soft: rgba(255, 94, 94, 0.14);
      --primary-soft: rgba(91, 158, 255, 0.14);
      --purple-soft:  rgba(164, 123, 255, 0.14);

      --overlay-bg: rgba(0, 0, 0, 0.65);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    /* 既知バグ① 修正 ([hidden] が CSS の display で上書きされないよう強制) */
    [hidden] { display: none !important; }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    /* チェックボックス・ラジオの色をテーマに統一 */
    input[type="checkbox"], input[type="radio"] { accent-color: var(--primary); }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tabs { display: flex; max-width: 600px; margin: 0 auto; }
    .tab {
      flex: 1; padding: 14px 6px; background: none; border: none;
      font-size: 15px; cursor: pointer; color: var(--text-dim);
      border-bottom: 3px solid transparent;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    main { max-width: 600px; margin: 0 auto; padding: 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .type-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .type-btn {
      flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--surface-elev);
      border-radius: 6px; cursor: pointer; font-size: 15px; color: var(--text);
    }
    .type-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .form { background: var(--surface); padding: 16px; border-radius: 8px; border: 1px solid var(--border); }
    .row { display: block; margin-bottom: 12px; }
    .row > span { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
    .row.inline { display: flex; align-items: center; gap: 6px; }
    .row.inline > span { display: inline; margin-bottom: 0; font-size: 14px; color: var(--text); }
    .row input[type="text"],
    .row input[type="number"],
    .row input[type="date"],
    .row input[type="month"],
    .row select,
    .row textarea {
      width: 100%; padding: 10px; font-size: 16px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface-elev); color: var(--text);
      caret-color: var(--text);
    }
    .row input::placeholder, .row textarea::placeholder { color: var(--text-muted); }
    .row textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    .link {
      background: none; border: none; color: var(--primary); cursor: pointer;
      font-size: 14px; padding: 8px 0; margin: 8px 0;
    }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .actions button {
      flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface-elev); color: var(--text); font-size: 16px; cursor: pointer;
    }
    .actions button.primary { background: var(--primary);  color: #fff; border-color: var(--primary); }
    .actions button.danger  { background: var(--expense);  color: #fff; border-color: var(--expense); }
    .actions button.ok      { background: var(--income);   color: #0a1018; border-color: var(--income); }
    .actions button:disabled { opacity: 0.5; cursor: not-allowed; }

    #list-empty { text-align: center; color: var(--text-muted); padding: 60px 16px; font-size: 16px; }
    .tx-row {
      display: grid;
      grid-template-columns: auto auto 1fr;
      grid-template-areas: "date type amount" "detail detail detail";
      gap: 4px 12px; padding: 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 8px; cursor: pointer;
    }
    .tx-row:hover { background: var(--surface-elev); }
    .tx-date   { grid-area: date; font-size: 13px; color: var(--text-dim); }
    .tx-type   { grid-area: type; font-size: 12px; padding: 2px 8px; border-radius: 4px; align-self: center; }
    .tx-type.type-expense  { background: var(--expense-soft); color: var(--expense); }
    .tx-type.type-income   { background: var(--income-soft);  color: var(--income); }
    .tx-type.type-transfer { background: var(--primary-soft); color: var(--primary); }
    .tx-amount { grid-area: amount; text-align: right; font-weight: 700; font-size: 17px; color: var(--text); }
    /* 金額テキストの符号色：支出=赤・収入=緑。振替は既定の var(--text) を維持 */
    .tx-type.type-expense ~ .tx-amount { color: var(--expense); }
    .tx-type.type-income  ~ .tx-amount { color: var(--income); }
    .tx-detail { grid-area: detail; font-size: 13px; color: var(--text-dim); word-break: break-all; }

    /* ====== 設定タブ ====== */
    .settings-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 12px; background: var(--surface); border-radius: 8px;
      border: 1px solid var(--border); margin-bottom: 12px; color: var(--text);
    }
    .accordion { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
    .accordion-head {
      padding: 14px 16px; cursor: pointer; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
      user-select: none; color: var(--text);
    }
    .accordion-head .chev { font-size: 11px; transition: transform 0.2s; color: var(--text-dim); }
    .accordion.open .accordion-head .chev { transform: rotate(180deg); }
    .accordion-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .accordion:not(.open) .accordion-body { display: none; }
    .add-row { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; align-items: stretch; }
    .add-row input, .add-row select {
      flex: 1; min-width: 110px; padding: 8px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 14px; background: var(--surface-elev); color: var(--text);
    }
    .add-row input::placeholder { color: var(--text-muted); }
    .add-row button {
      padding: 8px 14px; border: 1px solid var(--primary); background: var(--primary); color: #fff;
      border-radius: 4px; cursor: pointer; font-size: 14px; white-space: nowrap;
    }
    .add-row button:disabled { background: var(--border); border-color: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .master-list { list-style: none; padding: 0; margin: 0; }
    .master-item {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 4px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text);
    }
    .master-item:last-child { border-bottom: none; }
    .master-item.is-hidden { opacity: 0.45; }
    .master-name { flex: 1; word-break: break-all; }
    .master-meta { color: var(--text-dim); font-size: 12px; margin-left: 6px; }
    .master-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .master-actions button {
      padding: 4px 8px; background: var(--surface-elev); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1; color: var(--text);
    }
    .master-actions button:disabled { opacity: 0.3; cursor: not-allowed; }
    .nest-indent { padding-left: 20px; }
    .nest-children { padding-left: 0; }
    .child-add-btn {
      margin: 4px 0 8px 20px; padding: 4px 10px; font-size: 13px;
      background: var(--surface-elev); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 4px; cursor: pointer;
    }
    .parent-badge {
      display: inline-block; background: var(--primary-soft); color: var(--primary);
      font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 6px;
    }
    .empty-list { color: var(--text-muted); padding: 8px 4px; font-size: 13px; }

    /* ====== BADカテゴリ（labels）チップ：BAD項目はパープル系 ====== */
    .label-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .label-chip {
      display: inline-flex; align-items: center; padding: 6px 12px;
      background: var(--surface-elev); border: 1px solid var(--border); color: var(--text);
      border-radius: 16px;
      cursor: pointer; user-select: none; font-size: 13px;
    }
    .label-chip.on { background: var(--purple-soft); border-color: var(--accent-purple); color: var(--accent-purple); }
    .label-chip input { display: none; }
    .label-empty { color: var(--text-muted); font-size: 13px; }

    /* ====== モーダル共通 ====== */
    .overlay {
      position: fixed; inset: 0; background: var(--overlay-bg);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      padding: 16px;
    }
    .modal {
      background: var(--surface); padding: 24px; border-radius: 8px;
      max-width: 420px; width: 100%;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      max-height: 90vh; overflow-y: auto;
      color: var(--text);
    }
    .modal h3 { margin: 0 0 16px; font-size: 17px; color: var(--text); }
    .modal p  { margin: 0 0 20px; font-size: 16px; color: var(--text); }
    .modal-actions { display: flex; gap: 8px; }
    .modal-actions button {
      flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface-elev); color: var(--text); font-size: 16px; cursor: pointer;
    }
    .modal-actions button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .modal-actions button.danger  { background: var(--expense); color: #fff; border-color: var(--expense); }

    .boot-error {
      color: var(--expense); padding: 16px; font-weight: bold;
      background: var(--expense-soft); border: 1px solid var(--expense); border-radius: 6px;
      margin: 16px; max-width: 600px;
    }

    /* WebKit autofill が淡黄で潰れる対策 */
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px var(--surface-elev) inset !important;
      -webkit-text-fill-color: var(--text) !important;
      caret-color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="input">📥 入力</button>
      <button type="button" class="tab" data-tab="list">📋 伝票一覧</button>
      <button type="button" class="tab" data-tab="settings">⚙️ 設定</button>
    </div>
  </header>

  <main>
    <!-- ========== 入力タブ ========== -->
    <section id="tab-input" class="tab-panel active">
      <div class="type-bar">
        <button type="button" class="type-btn active" data-type="expense">支出</button>
        <button type="button" class="type-btn" data-type="income">収入</button>
        <button type="button" class="type-btn" data-type="transfer">振替</button>
      </div>

      <div class="form">
        <!-- 共通 -->
        <label class="row">
          <span>日付</span>
          <input id="f-date" type="date">
        </label>
        <label class="row">
          <span>金額</span>
          <input id="f-amount" type="number" inputmode="numeric" min="1" step="1">
        </label>

        <!-- 支出 -->
        <div data-type-only="expense">
          <label class="row">
            <span>出どころ</span>
            <select id="f-payment-source"></select>
          </label>
          <label class="row">
            <span>カテゴリ（細目）</span>
            <select id="f-subcategory"></select>
          </label>
          <label class="row">
            <span>店・場所</span>
            <select id="f-store"></select>
          </label>
          <div class="row inline">
            <input id="f-work-toggle" type="checkbox">
            <span>仕事</span>
          </div>
          <label class="row" id="f-work-ratio-wrap" hidden>
            <span>按分率（%・0〜100）</span>
            <input id="f-work-ratio" type="number" inputmode="numeric" min="0" max="100" step="1" value="0">
          </label>
          <div class="row inline">
            <input id="f-bad-toggle" type="checkbox">
            <span>BAD</span>
          </div>
          <div class="row" id="f-bad-labels-wrap" hidden>
            <span>BADカテゴリ（複数可）</span>
            <div id="f-bad-labels" class="label-chips"></div>
          </div>
          <label class="row" id="f-payment-date-wrap" hidden>
            <span>支払日</span>
            <input id="f-payment-date" type="date">
          </label>
        </div>

        <!-- 収入 -->
        <div data-type-only="income" hidden>
          <label class="row">
            <span>入金先</span>
            <select id="f-to-account-inc"></select>
          </label>
          <label class="row">
            <span>相手先</span>
            <input id="f-counterparty" type="text">
          </label>
          <label class="row">
            <span>カテゴリ</span>
            <select id="f-category-inc"></select>
          </label>
        </div>

        <!-- 振替 -->
        <div data-type-only="transfer" hidden>
          <label class="row">
            <span>出金口座</span>
            <select id="f-from-account"></select>
          </label>
          <label class="row">
            <span>入金口座</span>
            <select id="f-to-account-tr"></select>
          </label>
          <label class="row">
            <span>手数料</span>
            <input id="f-fee" type="number" inputmode="numeric" min="0" step="1" value="0">
          </label>
        </div>

        <!-- 詳細 -->
        <button type="button" id="detail-toggle" class="link">詳細 ▼</button>
        <div id="detail-area" hidden>
          <label class="row" data-type-only="expense income">
            <span>対象月</span>
            <input id="f-target-month" type="month">
          </label>
          <label class="row">
            <span>メモ</span>
            <textarea id="f-memo" rows="3"></textarea>
          </label>
        </div>

        <!-- ボタン -->
        <div class="actions" id="actions-new">
          <button type="button" id="btn-save" class="primary">保存</button>
        </div>
        <div class="actions" id="actions-edit" hidden>
          <button type="button" id="btn-update" class="primary">更新</button>
          <button type="button" id="btn-delete" class="danger">削除</button>
          <button type="button" id="btn-cancel">キャンセル</button>
        </div>
      </div>
    </section>

    <!-- ========== 伝票一覧タブ ========== -->
    <section id="tab-list" class="tab-panel">
      <div id="list-empty" hidden>まだ伝票がありません</div>
      <div id="list"></div>
    </section>

    <!-- ========== 設定タブ ========== -->
    <section id="tab-settings" class="tab-panel">
      <div class="settings-toggle">
        <input id="show-hidden" type="checkbox">
        <label for="show-hidden">非表示項目を表示する</label>
      </div>

      <div class="accordion" data-acc="expense-tree">
        <div class="accordion-head" data-acc-head>支出カテゴリ（親＋細目）<span class="chev">▼</span></div>
        <div class="accordion-body">
          <div class="add-row" data-add data-col="categories" data-kind="expense">
            <input type="text" data-add-name placeholder="カテゴリ名（例：食費）" maxlength="30">
            <button type="button" data-add-btn>追加</button>
          </div>
          <ul class="master-list" data-list data-col="categories" data-kind="expense" data-expense-tree></ul>
        </div>
      </div>

      <div class="accordion" data-acc="cat-inc">
        <div class="accordion-head" data-acc-head>収入項目<span class="chev">▼</span></div>
        <div class="accordion-body">
          <div class="add-row" data-add data-col="categories" data-kind="income">
            <input type="text" data-add-name placeholder="収入項目名" maxlength="30">
            <button type="button" data-add-btn>追加</button>
          </div>
          <ul class="master-list" data-list data-col="categories" data-kind="income"></ul>
        </div>
      </div>

      <div class="accordion" data-acc="stores">
        <div class="accordion-head" data-acc-head>お店・場所<span class="chev">▼</span></div>
        <div class="accordion-body">
          <div class="add-row" data-add data-col="stores">
            <input type="text" data-add-name placeholder="店・場所名" maxlength="30">
            <button type="button" data-add-btn>追加</button>
          </div>
          <ul class="master-list" data-list data-col="stores"></ul>
        </div>
      </div>

      <div class="accordion" data-acc="sources-account">
        <div class="accordion-head" data-acc-head>口座<span class="chev">▼</span></div>
        <div class="accordion-body">
          <div class="add-row" data-add data-col="payment_sources" data-kind="account">
            <input type="text" data-add-name placeholder="口座名" maxlength="30">
            <button type="button" data-add-btn>追加</button>
          </div>
          <ul class="master-list" data-list data-col="payment_sources" data-kind="account"></ul>
        </div>
      </div>

      <div class="accordion" data-acc="sources-card">
        <div class="accordion-head" data-acc-head>カード<span class="chev">▼</span></div>
        <div class="accordion-body">
          <div class="add-row" data-add data-col="payment_sources" data-kind="card">
            <input type="text" data-add-name placeholder="カード名" maxlength="30">
            <div class="subtype-radios" style="display:flex;gap:16px;align-items:center;flex-basis:100%;padding:4px 0">
              <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer"><input type="radio" name="add-card-subtype" value="credit" checked> credit（引落あり）</label>
              <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer"><input type="radio" name="add-card-subtype" value="debit"> debit（即引落）</label>
            </div>
            <input type="number" data-add-payday min="1" max="31" step="1" placeholder="引落日（credit・任意）">
            <select data-add-settlement>
              <option value="">引落先口座（任意）</option>
            </select>
            <button type="button" data-add-btn>追加</button>
          </div>
          <ul class="master-list" data-list data-col="payment_sources" data-kind="card"></ul>
        </div>
      </div>

      <div class="accordion" data-acc="labels">
        <div class="accordion-head" data-acc-head>BADカテゴリ<span class="chev">▼</span></div>
        <div class="accordion-body">
          <div class="add-row" data-add data-col="labels">
            <input type="text" data-add-name placeholder="BADカテゴリ名" maxlength="30">
            <button type="button" data-add-btn>追加</button>
          </div>
          <ul class="master-list" data-list data-col="labels"></ul>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== 削除確認モーダル ========== -->
  <div id="modal-overlay" class="overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-text">
    <div class="modal">
      <p id="modal-text">削除します。よろしいですか？</p>
      <div class="modal-actions">
        <button type="button" id="modal-cancel">キャンセル</button>
        <button type="button" id="modal-delete" class="danger">削除</button>
      </div>
    </div>
  </div>

  <!-- ========== マスタ編集モーダル ========== -->
  <div id="edit-overlay" class="overlay" hidden role="dialog" aria-modal="true" aria-labelledby="edit-title">
    <div class="modal">
      <h3 id="edit-title">編集</h3>
      <div id="edit-body"></div>
      <div class="modal-actions">
        <button type="button" id="edit-cancel">キャンセル</button>
        <button type="button" id="edit-save" class="primary">保存</button>
      </div>
    </div>
  </div>

  <!-- ========== 子追加モーダル（stores の子 / 細目）========== -->
  <div id="child-overlay" class="overlay" hidden role="dialog" aria-modal="true" aria-labelledby="child-title">
    <div class="modal">
      <h3 id="child-title">子を追加</h3>
      <div class="row">
        <span>名前</span>
        <input id="child-name" type="text" maxlength="30">
      </div>
      <div class="row" id="child-ratio-wrap" hidden>
        <span>按分初期率（%・0〜100）</span>
        <input id="child-ratio" type="number" inputmode="numeric" min="0" max="100" step="1" value="0">
      </div>
      <div class="modal-actions">
        <button type="button" id="child-cancel">キャンセル</button>
        <button type="button" id="child-save" class="primary">追加</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
      onSnapshot, query, orderBy, where, serverTimestamp, writeBatch
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // ====== Firebase 配線（作業#1から流用）======
    const firebaseConfig = {
      apiKey: "AIzaSyA8Bzpf0Dhd9GZE53DrsG_qQ6rHNSV-qcw",
      authDomain: "money-app-badf0.firebaseapp.com",
      projectId: "money-app-badf0",
      storageBucket: "money-app-badf0.firebasestorage.app",
      messagingSenderId: "976745439443",
      appId: "1:976745439443:web:59799f7b5346fd3c21f426"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ====== 定数 ======
    const MASTER_COLS = ["payment_sources", "categories", "stores", "subcategories", "labels"];

    // ====== state ======
    const state = {
      tab: "input",
      type: "expense",
      currentEditId: null,    // 編集中の伝票 docId
      // マスタ
      payment_sources: [],
      categories: [],
      stores: [],
      subcategories: [],
      labels: [],
      // 伝票
      transactions: [],
      // UI
      showHidden: false,
      imeComposing: false,
      selectedLabelIds: [],   // 伝票編集時の BAD labels
      pendingDelete: null,    // { kind:'tx'|'master', colName, docId, name? }
      pendingEdit: null,      // { colName, doc }
      pendingChildParent: null, // { colName, parentId }
      openAccordion: null,    // 現在開いている accordion-key
    };

    // ====== helpers ======
    const $  = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);
    const todayISO = () => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };
    const escapeHtml = (s) => String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    // showHidden の影響を考慮して可視項目を返す（設定タブ以外で使う）
    const visible = (items) => items.filter(x => !x.hidden);

    // ====== マスタ書込・共通関数（§3-1）======
    // 追加・改名・編集はすべてここを通す（B 段階のテンプレ登録も同じ経路）
    async function saveMaster(colName, data, id) {
      if (id) {
        await updateDoc(doc(db, colName, id), {
          ...data,
          updated_at: serverTimestamp(),
        });
      } else {
        const items = state[colName] || [];
        const maxOrder = items.reduce((m, x) => Math.max(m, x.sort_order || 0), 0);
        const payload = {
          hidden: false,
          ...data,
          sort_order: maxOrder + 1,
          created_at: serverTimestamp(),
          updated_at: serverTimestamp(),
        };
        await addDoc(collection(db, colName), payload);
      }
    }
    async function deleteMaster(colName, id) {
      await deleteDoc(doc(db, colName, id));
    }
    // ▲▼ で 2件の sort_order を入れ替え（writeBatch・§3-3）
    async function swapSortOrder(colName, idA, sortA, idB, sortB) {
      const batch = writeBatch(db);
      batch.update(doc(db, colName, idA), { sort_order: sortB, updated_at: serverTimestamp() });
      batch.update(doc(db, colName, idB), { sort_order: sortA, updated_at: serverTimestamp() });
      await batch.commit();
    }

    // ====== マスタ購読（live・onSnapshot）======
    function subscribeMasters() {
      for (const colName of MASTER_COLS) {
        const q = query(collection(db, colName), orderBy("sort_order", "asc"));
        onSnapshot(q, (snap) => {
          state[colName] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderAllSelects();
          renderSettings();
        }, (err) => {
          console.error(`${colName} onSnapshot error:`, err);
        });
      }
    }

    // ====== transactions 購読 ======
    function subscribeTransactions() {
      const q = query(collection(db, "transactions"), orderBy("created_at", "desc"));
      onSnapshot(q, (snap) => {
        state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList();
      }, (err) => {
        console.error("transactions onSnapshot error:", err);
      });
    }

    // ====== 入力フォーム select 描画 ======
    function renderAllSelects() {
      renderPaymentSourceSelect();
      renderAccountOnlySelect("f-to-account-inc");
      renderAccountOnlySelect("f-from-account");
      renderAccountOnlySelect("f-to-account-tr");
      renderSubcategorySelect("f-subcategory");
      renderCategorySelect("f-category-inc", "income");
      renderStoreSelect("f-store");
      // クレジット引落先口座の select は設定タブの追加欄にもあるので更新
      refreshSettlementAccountSelect();
      // 入金口座は出金口座次第で組み直す
      refreshTransferAccountSelects();
      // BAD labels chips
      renderBadLabelsChips();
    }

    // 出どころ＝ payment_sources 全件（kind=account|card 両方）
    function renderPaymentSourceSelect() {
      const sel = $("#f-payment-source");
      const prev = sel.value;
      sel.innerHTML = "";
      const items = visible(state.payment_sources);
      if (items.length === 0) {
        const opt = document.createElement("option");
        opt.value = ""; opt.textContent = "（設定タブで追加してください）";
        sel.appendChild(opt);
      }
      for (const s of items) {
        const opt = document.createElement("option");
        opt.value = s.id;
        const label = s.kind === "card" ? `カード:${s.name}` : `口座:${s.name}`;
        opt.textContent = label;
        opt.dataset.kind = s.kind;
        opt.dataset.subtype = s.subtype || "";
        sel.appendChild(opt);
      }
      // 復元
      if (prev && Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
      updatePaymentDateVisibility();
    }

    // 口座のみ（収入の入金先・振替の口座2つ）
    function renderAccountOnlySelect(elId) {
      const sel = document.getElementById(elId);
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = "";
      const items = visible(state.payment_sources).filter(x => x.kind === "account");
      if (items.length === 0) {
        const opt = document.createElement("option");
        opt.value = ""; opt.textContent = "（設定タブで口座を追加してください）";
        sel.appendChild(opt);
      }
      for (const s of items) {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name;
        sel.appendChild(opt);
      }
      if (prev && Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
    }

    // カテゴリ（収入のみ）：先頭に「── カテゴリなし ──」value="" を置く
    function renderCategorySelect(elId, kind) {
      const sel = document.getElementById(elId);
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = "";
      const noneOpt = document.createElement("option");
      noneOpt.value = ""; noneOpt.textContent = "── カテゴリなし ──";
      sel.appendChild(noneOpt);
      const items = visible(state.categories).filter(c => c.kind === kind);
      for (const c of items) {
        const opt = document.createElement("option");
        opt.value = c.id; opt.textContent = c.name;
        sel.appendChild(opt);
      }
      if (prev && Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
    }

    // 支出細目（subcategory）：親 category ごとに optgroup でグルーピング
    // option の value=subcategory.id、data-default-ratio=子の default_work_ratio
    function renderSubcategorySelect(elId) {
      const sel = document.getElementById(elId);
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = "";
      const noneOpt = document.createElement("option");
      noneOpt.value = ""; noneOpt.textContent = "── カテゴリなし ──";
      sel.appendChild(noneOpt);
      const cats = visible(state.categories).filter(c => c.kind === "expense");
      const subs = visible(state.subcategories);
      for (const cat of cats) {
        const group = document.createElement("optgroup");
        group.label = cat.name;
        const children = subs.filter(s => s.parent_id === cat.id);
        for (const child of children) {
          const opt = document.createElement("option");
          opt.value = child.id;
          opt.textContent = child.name;
          opt.dataset.defaultRatio = child.default_work_ratio == null ? "" : String(child.default_work_ratio);
          group.appendChild(opt);
        }
        if (children.length === 0) {
          const opt = document.createElement("option");
          opt.disabled = true;
          opt.textContent = "（細目なし）";
          group.appendChild(opt);
        }
        sel.appendChild(group);
      }
      if (prev && Array.from(sel.querySelectorAll("option")).some(o => o.value === prev)) {
        sel.value = prev;
      }
    }

    // 店・場所：先頭に「── 店なし ──」、入れ子は字下げで表示
    function renderStoreSelect(elId) {
      const sel = document.getElementById(elId);
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = "";
      const noneOpt = document.createElement("option");
      noneOpt.value = ""; noneOpt.textContent = "── 店なし ──";
      sel.appendChild(noneOpt);
      const items = visible(state.stores);
      const parents = items.filter(s => !s.parent_id);
      for (const p of parents) {
        const opt = document.createElement("option");
        opt.value = p.id; opt.textContent = p.name;
        sel.appendChild(opt);
        const children = items.filter(s => s.parent_id === p.id);
        for (const c of children) {
          const c2 = document.createElement("option");
          c2.value = c.id; c2.textContent = "　└ " + c.name;
          sel.appendChild(c2);
        }
      }
      // 親なしで孤児になっている子も末尾に出す（マスタ整合性のため）
      const orphans = items.filter(s => s.parent_id && !parents.some(p => p.id === s.parent_id));
      for (const o of orphans) {
        const opt = document.createElement("option");
        opt.value = o.id; opt.textContent = "（孤児）" + o.name;
        sel.appendChild(opt);
      }
      if (prev && Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
    }

    function renderBadLabelsChips() {
      const root = $("#f-bad-labels");
      const prevSel = new Set(state.selectedLabelIds);
      root.innerHTML = "";
      const items = visible(state.labels);
      if (items.length === 0) {
        root.innerHTML = `<span class="label-empty">設定タブで BAD カテゴリを追加してください</span>`;
        return;
      }
      for (const l of items) {
        const id = `bad-lbl-${escapeHtml(l.id)}`;
        const wrap = document.createElement("label");
        wrap.className = "label-chip" + (prevSel.has(l.id) ? " on" : "");
        wrap.innerHTML = `<input type="checkbox" data-label-id="${escapeHtml(l.id)}" ${prevSel.has(l.id) ? "checked" : ""}>${escapeHtml(l.name)}`;
        root.appendChild(wrap);
      }
    }

    // 設定タブ：クレジットカード追加欄の引落先口座 select
    function refreshSettlementAccountSelect() {
      const sel = document.querySelector('[data-add-settlement]');
      if (!sel) return;
      const prev = sel.value;
      sel.innerHTML = "";
      const noneOpt = document.createElement("option");
      noneOpt.value = ""; noneOpt.textContent = "引落先口座（任意）";
      sel.appendChild(noneOpt);
      for (const s of visible(state.payment_sources).filter(x => x.kind === "account")) {
        const opt = document.createElement("option");
        opt.value = s.id; opt.textContent = s.name;
        sel.appendChild(opt);
      }
      if (prev && Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
    }

    function refreshTransferAccountSelects() {
      if (state.type !== "transfer") return;
      const fromSel = $("#f-from-account");
      const toSel   = $("#f-to-account-tr");
      const fromId  = fromSel.value;
      const prevTo  = toSel.value;
      toSel.innerHTML = "";
      const accs = visible(state.payment_sources).filter(s => s.kind === "account");
      if (accs.length === 0) {
        const opt = document.createElement("option");
        opt.value = ""; opt.textContent = "（設定タブで口座を追加してください）";
        toSel.appendChild(opt);
        return;
      }
      for (const a of accs) {
        if (a.id === fromId) continue;
        const opt = document.createElement("option");
        opt.value = a.id; opt.textContent = a.name;
        toSel.appendChild(opt);
      }
      if (prevTo && prevTo !== fromId && Array.from(toSel.options).some(o => o.value === prevTo)) {
        toSel.value = prevTo;
      }
    }

    // ====== 一覧描画 ======
    function renderList() {
      const root = $("#list");
      const empty = $("#list-empty");
      if (state.transactions.length === 0) {
        root.innerHTML = "";
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      const html = state.transactions.map((tx) => {
        const typeLabel = tx.type === "expense" ? "支出" : tx.type === "income" ? "収入" : "振替";
        let detail = "";
        if (tx.type === "expense") {
          const src = state.payment_sources.find(s => s.id === tx.payment_source_id);
          const srcName = src ? (src.kind === "card" ? `カード:${src.name}` : `口座:${src.name}`) : "?";
          let catName;
          if (tx.subcategory_id) {
            const sub = state.subcategories.find(s => s.id === tx.subcategory_id);
            if (sub) {
              const parent = state.categories.find(c => c.id === sub.parent_id);
              catName = parent ? `${parent.name} > ${sub.name}` : sub.name;
            } else {
              catName = "?";
            }
          } else {
            catName = "カテゴリなし";
          }
          const store = state.stores.find(s => s.id === tx.store_id);
          const storePart = store ? ` @${store.name}` : "";
          detail = `${srcName} / ${catName}${storePart}`;
        } else if (tx.type === "income") {
          const acc = state.payment_sources.find(s => s.id === tx.to_account_id);
          const accName = acc ? acc.name : "?";
          const cat = state.categories.find(c => c.id === tx.category);
          const catName = tx.category ? (cat ? cat.name : "?") : "カテゴリなし";
          const cp = tx.counterparty ? `（${tx.counterparty}）` : "";
          detail = `→${accName} / ${catName}${cp}`;
        } else {
          const from = state.payment_sources.find(s => s.id === tx.from_account_id);
          const to   = state.payment_sources.find(s => s.id === tx.to_account_id);
          detail = `${from ? from.name : "?"} → ${to ? to.name : "?"}`;
          if (tx.fee) detail += `（手数料 ¥${Number(tx.fee).toLocaleString()}）`;
        }
        const memo = tx.memo ? ` / ${tx.memo.length > 20 ? tx.memo.slice(0, 20) + "…" : tx.memo}` : "";
        const amt = Number(tx.amount || 0).toLocaleString();
        const dt  = tx.transaction_date || "";
        return `
          <div class="tx-row" data-id="${escapeHtml(tx.id)}">
            <div class="tx-date">${escapeHtml(dt)}</div>
            <div class="tx-type type-${escapeHtml(tx.type)}">${escapeHtml(typeLabel)}</div>
            <div class="tx-amount">¥${escapeHtml(amt)}</div>
            <div class="tx-detail">${escapeHtml(detail + memo)}</div>
          </div>
        `;
      }).join("");
      root.innerHTML = html;
    }

    // ====== 設定タブ描画 ======
    function renderSettings() {
      const showHidden = state.showHidden;
      for (const list of $$("[data-list]")) {
        const colName = list.dataset.col;
        const kindFilter = list.dataset.kind || null;
        // 支出カテゴリは expense-tree として親+子（subcategories）を一括描画
        if (list.hasAttribute("data-expense-tree")) {
          list.innerHTML = renderExpenseTreeHTML();
          continue;
        }
        let items = state[colName] || [];
        if (kindFilter) items = items.filter(x => x.kind === kindFilter);
        if (!showHidden) items = items.filter(x => !x.hidden);
        // 並びは sort_order 昇順（subscribeMasters で既に並んでいる）
        list.innerHTML = renderMasterListHTML(colName, items, kindFilter);
      }
      // クレジットカード追加欄の引落先 select を更新
      refreshSettlementAccountSelect();
    }

    // 支出カテゴリ：親=categories(kind=expense)、子=subcategories where parent_id=parent.id
    function renderExpenseTreeHTML() {
      const showHidden = state.showHidden;
      let cats = state.categories.filter(c => c.kind === "expense");
      if (!showHidden) cats = cats.filter(c => !c.hidden);
      cats = [...cats].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      if (cats.length === 0) return `<li class="empty-list">まだ親カテゴリがありません</li>`;
      let html = "";
      const allSubs = state.subcategories;
      for (const cat of cats) {
        let children = allSubs.filter(s => s.parent_id === cat.id);
        if (!showHidden) children = children.filter(c => !c.hidden);
        children = [...children].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
        html += renderRowHTML("categories", cat, cats, false, children.length);
        for (const child of children) {
          html += renderRowHTML("subcategories", child, children, true, 0);
        }
        html += `<button class="child-add-btn" data-child-add data-col="subcategories" data-parent="${escapeHtml(cat.id)}" data-needs-ratio>＋ 細目を追加</button>`;
      }
      // 親が存在しない・非表示の subcategories（孤児）も末尾に
      const parentIds = new Set(state.categories.filter(c => c.kind === "expense").map(c => c.id));
      let orphans = allSubs.filter(s => s.parent_id && !parentIds.has(s.parent_id));
      if (!showHidden) orphans = orphans.filter(c => !c.hidden);
      for (const o of orphans) {
        html += renderRowHTML("subcategories", o, orphans, true, 0);
      }
      return html;
    }

    function renderMasterListHTML(colName, items, kindFilter) {
      if (colName === "stores" || colName === "subcategories") {
        // 入れ子レンダリング
        const parents = items.filter(x => !x.parent_id);
        if (parents.length === 0 && items.length === 0) {
          return `<li class="empty-list">まだ項目がありません</li>`;
        }
        let html = "";
        for (const p of parents) {
          const children = items.filter(x => x.parent_id === p.id);
          html += renderRowHTML(colName, p, items, false, children.length);
          if (children.length > 0) {
            for (const c of children) {
              html += renderRowHTML(colName, c, items, true, 0);
            }
          }
          html += `<button class="child-add-btn" data-child-add data-col="${escapeHtml(colName)}" data-parent="${escapeHtml(p.id)}">＋ 子を追加</button>`;
        }
        // 孤児（親が hidden 等で隠れてしまった子）
        const orphans = items.filter(x => x.parent_id && !parents.some(p => p.id === x.parent_id));
        for (const o of orphans) {
          html += renderRowHTML(colName, o, items, true, 0);
        }
        return html;
      }
      // フラット
      if (items.length === 0) return `<li class="empty-list">まだ項目がありません</li>`;
      return items.map(it => renderRowHTML(colName, it, items, false, 0)).join("");
    }

    function renderRowHTML(colName, item, siblings, isChild, childCount) {
      const hiddenCls = item.hidden ? " is-hidden" : "";
      const nestCls   = isChild ? " nest-indent" : "";
      const badge     = childCount > 0 ? `<span class="parent-badge">${childCount}</span>` : "";
      // 同階層内の前後判定
      const sameLevel = siblings.filter(x =>
        (!!x.parent_id === !!item.parent_id) &&
        (item.parent_id ? x.parent_id === item.parent_id : true)
      );
      // ▲は先頭で disabled、▼は末尾で disabled
      const sorted = [...sameLevel].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      const idx = sorted.findIndex(x => x.id === item.id);
      const upDisabled   = idx <= 0 ? " disabled" : "";
      const downDisabled = idx === sorted.length - 1 ? " disabled" : "";
      // メタ（カードのみ subtype と引落日を表示）
      let meta = "";
      if (colName === "payment_sources" && item.kind === "card") {
        const parts = [];
        if (item.subtype) parts.push(item.subtype);
        if (item.payment_day) parts.push(`${item.payment_day}日引落`);
        if (parts.length) meta = `<span class="master-meta">${escapeHtml(parts.join(" / "))}</span>`;
      } else if (colName === "subcategories" && item.default_work_ratio != null) {
        meta = `<span class="master-meta">按分初期${escapeHtml(item.default_work_ratio)}%</span>`;
      }
      return `
        <li class="master-item${hiddenCls}${nestCls}" data-id="${escapeHtml(item.id)}" data-col="${escapeHtml(colName)}">
          <span class="master-name">${escapeHtml(item.name)}${badge}${meta}${item.hidden ? '<span class="master-meta">（非表示）</span>' : ''}</span>
          <span class="master-actions">
            <button type="button" data-act="up"${upDisabled} title="上へ">▲</button>
            <button type="button" data-act="down"${downDisabled} title="下へ">▼</button>
            <button type="button" data-act="edit" title="編集">✏</button>
            <button type="button" data-act="del" title="削除">🗑</button>
          </span>
        </li>
      `;
    }

    // ====== タブ／type 切替 ======
    function switchTab(tab) {
      state.tab = tab;
      for (const el of $$(".tab")) el.classList.toggle("active", el.dataset.tab === tab);
      for (const el of $$(".tab-panel")) el.classList.toggle("active", el.id === `tab-${tab}`);
    }
    function switchType(type) {
      state.type = type;
      for (const el of $$(".type-btn")) el.classList.toggle("active", el.dataset.type === type);
      for (const el of $$("[data-type-only]")) {
        const allowed = el.dataset.typeOnly.split(/\s+/);
        el.hidden = !allowed.includes(type);
      }
      updatePaymentDateVisibility();
      updateWorkRatioVisibility();
      updateBadLabelsVisibility();
      refreshTransferAccountSelects();
    }
    function updatePaymentDateVisibility() {
      const wrap = $("#f-payment-date-wrap");
      if (state.type !== "expense") { wrap.hidden = true; return; }
      const sel = $("#f-payment-source");
      const opt = sel.options[sel.selectedIndex];
      wrap.hidden = !(opt && opt.dataset.kind === "card" && opt.dataset.subtype === "credit");
    }
    function updateWorkRatioVisibility() {
      const wrap = $("#f-work-ratio-wrap");
      if (state.type !== "expense") { wrap.hidden = true; return; }
      wrap.hidden = !$("#f-work-toggle").checked;
    }
    // 選択中の細目（subcategory）の default_work_ratio を返す（option の data-default-ratio）
    function getSelectedSubcategoryDefaultRatio() {
      const sel = $("#f-subcategory");
      const opt = sel && sel.options[sel.selectedIndex];
      if (!opt) return null;
      const dr = opt.dataset.defaultRatio;
      if (dr === "" || dr == null) return null;
      const n = Number(dr);
      return Number.isFinite(n) ? n : null;
    }
    function updateBadLabelsVisibility() {
      const wrap = $("#f-bad-labels-wrap");
      if (state.type !== "expense") { wrap.hidden = true; return; }
      wrap.hidden = !$("#f-bad-toggle").checked;
    }

    // ====== フォーム ======
    function resetForm() {
      state.currentEditId = null;
      state.selectedLabelIds = [];
      $("#f-date").value = todayISO();
      $("#f-amount").value = "";
      $("#f-payment-date").value = "";
      $("#f-target-month").value = "";
      $("#f-memo").value = "";
      $("#f-counterparty").value = "";
      $("#f-fee").value = "0";
      $("#f-work-toggle").checked = false;
      $("#f-work-ratio").value = "0";
      $("#f-bad-toggle").checked = false;
      $("#detail-area").hidden = true;
      $("#detail-toggle").textContent = "詳細 ▼";
      $("#actions-new").hidden = false;
      $("#actions-edit").hidden = true;
      // select は先頭に
      for (const id of ["f-payment-source","f-subcategory","f-category-inc","f-store",
                        "f-to-account-inc","f-from-account","f-to-account-tr"]) {
        const el = document.getElementById(id);
        if (el && el.options.length) el.selectedIndex = 0;
      }
      switchType("expense");
      renderBadLabelsChips();
      $("#f-amount").focus();
    }

    function enterEditMode(tx) {
      state.currentEditId = tx.id;
      state.selectedLabelIds = Array.isArray(tx.label_ids) ? [...tx.label_ids] : [];
      switchType(tx.type);
      $("#f-date").value   = tx.transaction_date || todayISO();
      $("#f-amount").value = tx.amount ?? "";
      $("#f-memo").value   = tx.memo || "";
      $("#f-target-month").value = tx.target_month || "";

      if (tx.type === "expense") {
        const sel = $("#f-payment-source");
        if (tx.payment_source_id && Array.from(sel.options).some(o => o.value === tx.payment_source_id)) {
          sel.value = tx.payment_source_id;
        }
        $("#f-subcategory").value = tx.subcategory_id || "";
        $("#f-store").value = tx.store_id || "";
        $("#f-work-toggle").checked = tx.work_ratio != null;
        $("#f-work-ratio").value    = tx.work_ratio != null ? tx.work_ratio : 0;
        $("#f-bad-toggle").checked  = !!tx.is_bad;
        $("#f-payment-date").value  = tx.payment_date || "";
        updatePaymentDateVisibility();
        updateWorkRatioVisibility();
        updateBadLabelsVisibility();
        renderBadLabelsChips();
      } else if (tx.type === "income") {
        $("#f-to-account-inc").value = tx.to_account_id || "";
        $("#f-counterparty").value   = tx.counterparty || "";
        $("#f-category-inc").value   = tx.category || "";
      } else if (tx.type === "transfer") {
        $("#f-from-account").value = tx.from_account_id || "";
        refreshTransferAccountSelects();
        $("#f-to-account-tr").value = tx.to_account_id || "";
        $("#f-fee").value = tx.fee != null ? tx.fee : 0;
      }
      if ((tx.memo && tx.memo.length) || tx.target_month) {
        $("#detail-area").hidden = false;
        $("#detail-toggle").textContent = "詳細 ▲";
      }
      $("#actions-new").hidden  = true;
      $("#actions-edit").hidden = false;
      switchTab("input");
    }

    // ====== 伝票 payload 生成（新スキーマ）======
    function buildPayload() {
      const type = state.type;
      const transaction_date = $("#f-date").value || todayISO();
      const amount = Number($("#f-amount").value || 0);
      const memoVal = $("#f-memo").value.trim();
      const targetMonth = $("#f-target-month").value || null;

      // 共通の器（§3-2 に基づき不足分も常時保存）
      const base = {
        type,
        amount,
        transaction_date,
        memo: memoVal || null,
        no_receipt: false,            // 器のみ確保（UI は B）
        breakdown: [],                // 器のみ確保（UI は B）
        updated_at: serverTimestamp(),
      };
      if (state.currentEditId == null) base.created_at = serverTimestamp();

      if (type === "expense") {
        const srcId = $("#f-payment-source").value || null;
        base.payment_source_id = srcId;
        base.subcategory_id = $("#f-subcategory").value || null;   // "" → null（カテゴリなし）
        base.store_id = $("#f-store").value || null;
        base.is_bad   = $("#f-bad-toggle").checked;
        base.label_ids = $("#f-bad-toggle").checked ? [...state.selectedLabelIds] : [];
        base.work_ratio = $("#f-work-toggle").checked
          ? Number($("#f-work-ratio").value || 0)
          : null;
        base.target_month = targetMonth;
        // 支払日：出どころが kind=card かつ subtype=credit のときフォームの値
        const src = state.payment_sources.find(s => s.id === srcId);
        if (src && src.kind === "card" && src.subtype === "credit") {
          base.payment_date = $("#f-payment-date").value || null;
        } else {
          base.payment_date = transaction_date;
        }
      } else if (type === "income") {
        base.to_account_id = $("#f-to-account-inc").value || null;
        base.counterparty  = $("#f-counterparty").value.trim() || null;
        base.category      = $("#f-category-inc").value || null;
        base.target_month  = targetMonth;
        base.payment_date  = transaction_date;
      } else if (type === "transfer") {
        base.from_account_id = $("#f-from-account").value || null;
        base.to_account_id   = $("#f-to-account-tr").value || null;
        base.fee             = Number($("#f-fee").value || 0);
        base.payment_date    = transaction_date;
      }
      return base;
    }

    function validate(p) {
      if (!p.amount || p.amount <= 0) return "金額を1円以上で入力してください";
      if (!p.transaction_date)        return "日付を入力してください";

      const accCount = visible(state.payment_sources).filter(s => s.kind === "account").length;
      const allSrcCount = visible(state.payment_sources).length;

      if (p.type === "expense") {
        if (allSrcCount === 0) return "設定タブで口座またはカードを追加してください";
        if (!p.payment_source_id) return "出どころを選択してください";
        if (p.work_ratio != null && (p.work_ratio < 0 || p.work_ratio > 100))
          return "按分率は0〜100で入力してください";
      }
      if (p.type === "income") {
        if (accCount === 0) return "設定タブで入金先の口座を追加してください";
        if (!p.to_account_id) return "入金先を選択してください";
      }
      if (p.type === "transfer") {
        if (accCount < 2) return "設定タブで口座を2つ以上追加してください";
        if (!p.from_account_id) return "出金口座を選択してください";
        if (!p.to_account_id)   return "入金口座を選択してください";
        if (p.from_account_id === p.to_account_id)
          return "出金口座と入金口座は別の口座を選んでください";
        if (p.fee < 0) return "手数料は0以上で入力してください";
      }
      return null;
    }

    async function saveTransaction() {
      const payload = buildPayload();
      const err = validate(payload);
      if (err) { alert(err); return; }
      const isNew = state.currentEditId == null;
      const btn   = isNew ? $("#btn-save") : $("#btn-update");
      btn.disabled = true;
      try {
        if (isNew) {
          await addDoc(collection(db, "transactions"), payload);
        } else {
          await updateDoc(doc(db, "transactions", state.currentEditId), payload);
        }
        flashSaveOk(btn);
        resetForm();
      } catch (e) {
        console.error(e);
        alert("保存に失敗しました: " + (e?.message || e));
      } finally {
        btn.disabled = false;
      }
    }
    function flashSaveOk(btn) {
      const original = btn.textContent;
      btn.textContent = "✓ 保存しました";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = original; btn.classList.remove("ok"); }, 1500);
    }

    // ====== 削除モーダル（伝票・マスタ兼用）======
    let modalLastFocus = null;
    function openConfirmDelete(target) {
      state.pendingDelete = target;
      modalLastFocus = document.activeElement;
      const text = target.kind === "tx"
        ? "この伝票を削除します。よろしいですか？"
        : `「${target.name}」を削除します。よろしいですか？`;
      $("#modal-text").textContent = text;
      $("#modal-overlay").hidden = false;
      requestAnimationFrame(() => $("#modal-cancel").focus());
    }
    function closeConfirmDelete() {
      $("#modal-overlay").hidden = true;
      state.pendingDelete = null;
      if (modalLastFocus && typeof modalLastFocus.focus === "function") modalLastFocus.focus();
    }
    async function performDelete() {
      const target = state.pendingDelete;
      if (!target) { closeConfirmDelete(); return; }
      try {
        if (target.kind === "tx") {
          await deleteDoc(doc(db, "transactions", target.docId));
          closeConfirmDelete();
          if (state.currentEditId === target.docId) resetForm();
        } else {
          await deleteMaster(target.colName, target.docId);
          closeConfirmDelete();
        }
      } catch (e) {
        console.error(e);
        closeConfirmDelete();
        alert("削除に失敗しました: " + (e?.message || e));
      }
    }

    // ====== マスタ編集モーダル ======
    function openEditModal(colName, item) {
      state.pendingEdit = { colName, doc: item };
      const body = $("#edit-body");
      const title = $("#edit-title");
      let html = `
        <div class="row">
          <span>名前</span>
          <input id="edit-name" type="text" maxlength="30" value="${escapeHtml(item.name || "")}">
        </div>
        <div class="row inline">
          <input id="edit-hidden" type="checkbox" ${item.hidden ? "checked" : ""}>
          <span>非表示にする</span>
        </div>
      `;
      if (colName === "categories" && item.kind === "expense") {
        title.textContent = "支出カテゴリ（親）を編集";
      } else if (colName === "categories" && item.kind === "income") {
        title.textContent = "収入項目を編集";
      } else if (colName === "stores") {
        title.textContent = "店・場所を編集";
      } else if (colName === "subcategories") {
        title.textContent = "細目を編集";
        html += `
          <div class="row">
            <span>按分初期率（%・0〜100）</span>
            <input id="edit-ratio" type="number" inputmode="numeric" min="0" max="100" step="1" value="${item.default_work_ratio == null ? 0 : escapeHtml(item.default_work_ratio)}">
          </div>
        `;
      } else if (colName === "labels") {
        title.textContent = "BAD カテゴリを編集";
      } else if (colName === "payment_sources" && item.kind === "account") {
        title.textContent = "口座を編集";
      } else if (colName === "payment_sources" && item.kind === "card") {
        title.textContent = "カードを編集";
        const accs = visible(state.payment_sources).filter(s => s.kind === "account");
        const settleOpts = [`<option value="">引落先口座（任意）</option>`].concat(
          accs.map(a => `<option value="${escapeHtml(a.id)}" ${a.id === item.settlement_account_id ? "selected" : ""}>${escapeHtml(a.name)}</option>`)
        ).join("");
        html += `
          <div class="row">
            <span>種別</span>
            <div style="display:flex;gap:16px;align-items:center;padding:4px 0">
              <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer"><input type="radio" name="edit-card-subtype" value="credit" ${item.subtype === "credit" ? "checked" : ""}> credit（引落あり）</label>
              <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer"><input type="radio" name="edit-card-subtype" value="debit" ${item.subtype === "debit" ? "checked" : ""}> debit（即引落）</label>
            </div>
          </div>
          <div class="row">
            <span>引落日（1〜31・credit時の任意）</span>
            <input id="edit-payday" type="number" min="1" max="31" step="1" value="${item.payment_day == null ? "" : escapeHtml(item.payment_day)}">
          </div>
          <div class="row">
            <span>引落先口座</span>
            <select id="edit-settlement">${settleOpts}</select>
          </div>
        `;
      } else {
        title.textContent = "編集";
      }
      body.innerHTML = html;
      $("#edit-overlay").hidden = false;
      requestAnimationFrame(() => $("#edit-name").focus());
    }
    function closeEditModal() {
      $("#edit-overlay").hidden = true;
      state.pendingEdit = null;
    }
    async function saveEditModal() {
      const pe = state.pendingEdit;
      if (!pe) { closeEditModal(); return; }
      const { colName, doc: item } = pe;
      const name = $("#edit-name").value.trim();
      if (!name) { alert("名前を入力してください"); return; }
      const data = { name, hidden: $("#edit-hidden").checked };
      if (colName === "subcategories") {
        const r = $("#edit-ratio").value;
        data.default_work_ratio = r === "" || r == null ? 0 : Math.max(0, Math.min(100, Number(r)));
      }
      if (colName === "payment_sources" && item.kind === "card") {
        const sub = document.querySelector('input[name="edit-card-subtype"]:checked')?.value || "credit";
        data.subtype = sub;
        const pd = $("#edit-payday").value;
        data.payment_day = pd === "" ? null : Math.max(1, Math.min(31, Number(pd)));
        data.settlement_account_id = $("#edit-settlement").value || null;
      }
      try {
        await saveMaster(colName, data, item.id);
        closeEditModal();
      } catch (e) {
        console.error(e);
        alert("更新に失敗しました: " + (e?.message || e));
      }
    }

    // ====== 子追加モーダル（stores 子 / 細目）======
    function openChildModal(colName, parentId, opts) {
      const needsRatio = !!(opts && opts.needsRatio);
      state.pendingChildParent = { colName, parentId, needsRatio };
      $("#child-name").value = "";
      $("#child-ratio").value = "0";
      $("#child-ratio-wrap").hidden = !needsRatio;
      $("#child-title").textContent = needsRatio ? "細目を追加" : "子を追加";
      $("#child-overlay").hidden = false;
      requestAnimationFrame(() => $("#child-name").focus());
    }
    function closeChildModal() {
      $("#child-overlay").hidden = true;
      state.pendingChildParent = null;
    }
    async function saveChildModal() {
      const pc = state.pendingChildParent;
      if (!pc) { closeChildModal(); return; }
      const name = $("#child-name").value.trim();
      if (!name) { alert("名前を入力してください"); return; }
      const data = { name, parent_id: pc.parentId };
      if (pc.needsRatio) {
        const r = $("#child-ratio").value;
        data.default_work_ratio = r === "" || r == null ? 0 : Math.max(0, Math.min(100, Number(r)));
      }
      try {
        await saveMaster(pc.colName, data);
        closeChildModal();
      } catch (e) {
        console.error(e);
        alert("追加に失敗しました: " + (e?.message || e));

    // ====== 設定タブ：追加欄ハンドラ ======
    async function handleAddRow(addRow) {
      const colName = addRow.dataset.col;
      const kind    = addRow.dataset.kind || null;
      const nameEl  = addRow.querySelector("[data-add-name]");
      const name = (nameEl?.value || "").trim();
      if (!name) { alert("名前を入力してください"); nameEl?.focus(); return; }
      const data = { name };
      if (kind) data.kind = kind;
      if (colName === "payment_sources" && kind === "card") {
        const subtype = addRow.querySelector('input[name="add-card-subtype"]:checked')?.value || "credit";
        const pd = addRow.querySelector("[data-add-payday]")?.value;
        const settle = addRow.querySelector("[data-add-settlement]")?.value || null;
        data.subtype = subtype;                 // 'credit' | 'debit'
        data.payment_day = pd === "" || pd == null ? null : Math.max(1, Math.min(31, Number(pd)));
        data.settlement_account_id = settle || null;
      }
      if (colName === "payment_sources" && kind === "account") {
        data.include_in_total = true;
        data.subtype = null;                    // 口座は subtype を持たない（明示 null）
      }
      if (colName === "stores" || colName === "subcategories") {
        data.parent_id = null; // トップレベルとして追加
      }
      try {
        await saveMaster(colName, data);
        // 入力欄クリア
        nameEl.value = "";
        for (const el of addRow.querySelectorAll('input[type="number"]')) el.value = "";
      } catch (e) {
        console.error(e);
        alert("追加に失敗しました: " + (e?.message || e));
      }
    }

    // ====== 設定タブ：行アクション（▲▼✏🗑）======
    async function handleMasterAction(li, action) {
      const colName = li.dataset.col;
      const id      = li.dataset.id;
      const item    = (state[colName] || []).find(x => x.id === id);
      if (!item) return;

      if (action === "edit") { openEditModal(colName, item); return; }
      if (action === "del")  {
        openConfirmDelete({ kind: "master", colName, docId: id, name: item.name });
        return;
      }
      if (action === "up" || action === "down") {
        // 同階層内で前後を入替
        const all = state[colName] || [];
        const siblings = all.filter(x =>
          item.parent_id ? x.parent_id === item.parent_id : !x.parent_id
        ).filter(x => state.showHidden || !x.hidden)
         .filter(x => (item.kind ? x.kind === item.kind : true));
        siblings.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
        const idx = siblings.findIndex(x => x.id === id);
        const target = action === "up" ? siblings[idx - 1] : siblings[idx + 1];
        if (!target) return;
        try {
          await swapSortOrder(colName, item.id, item.sort_order || 0, target.id, target.sort_order || 0);
        } catch (e) {
          console.error(e);
          alert("並べ替えに失敗しました: " + (e?.message || e));
        }
      }
    }

    // ====== イベント結線 ======
    function bindEvents() {
      // タブ切替
      for (const el of $$(".tab")) {
        el.addEventListener("click", () => {
          const t = el.dataset.tab;
          // 編集中に伝票一覧以外へ移ると編集破棄（既存仕様維持）
          if (state.currentEditId != null && t !== "input") resetForm();
          switchTab(t);
        });
      }
      // type 切替
      for (const el of $$(".type-btn")) {
        el.addEventListener("click", () => {
          if (state.currentEditId != null) resetForm();
          switchType(el.dataset.type);
        });
      }
      // 詳細開閉
      $("#detail-toggle").addEventListener("click", () => {
        const area = $("#detail-area");
        area.hidden = !area.hidden;
        $("#detail-toggle").textContent = area.hidden ? "詳細 ▼" : "詳細 ▲";
      });
      // 出どころ変更 → 支払日表示
      $("#f-payment-source").addEventListener("change", updatePaymentDateVisibility);
      // 仕事トグル → 按分率欄の表示と、選択中の細目の default_work_ratio をプリフィル
      $("#f-work-toggle").addEventListener("change", () => {
        updateWorkRatioVisibility();
        if ($("#f-work-toggle").checked) {
          const dr = getSelectedSubcategoryDefaultRatio();
          $("#f-work-ratio").value = dr != null ? dr : 0;
        }
      });
      // 細目変更 → 仕事ON 中なら default_work_ratio をプリフィル
      $("#f-subcategory").addEventListener("change", () => {
        if ($("#f-work-toggle").checked) {
          const dr = getSelectedSubcategoryDefaultRatio();
          $("#f-work-ratio").value = dr != null ? dr : 0;
        }
      });
      // BAD トグル → labels chips 表示
      $("#f-bad-toggle").addEventListener("change", () => {
        updateBadLabelsVisibility();
      });
      // BAD labels chips クリック（delegation）
      $("#f-bad-labels").addEventListener("change", (e) => {
        const cb = e.target.closest('input[type="checkbox"][data-label-id]');
        if (!cb) return;
        const id = cb.dataset.labelId;
        if (cb.checked) {
          if (!state.selectedLabelIds.includes(id)) state.selectedLabelIds.push(id);
        } else {
          state.selectedLabelIds = state.selectedLabelIds.filter(x => x !== id);
        }
        // chip 見た目
        const chip = cb.closest(".label-chip");
        if (chip) chip.classList.toggle("on", cb.checked);
      });
      // 振替・出金口座変更
      $("#f-from-account").addEventListener("change", refreshTransferAccountSelects);
      // 保存／更新／キャンセル／削除（伝票）
      $("#btn-save").addEventListener("click", saveTransaction);
      $("#btn-update").addEventListener("click", saveTransaction);
      $("#btn-cancel").addEventListener("click", () => { resetForm(); });
      $("#btn-delete").addEventListener("click", () => {
        if (state.currentEditId == null) return;
        openConfirmDelete({ kind: "tx", docId: state.currentEditId });
      });
      // 削除モーダル
      $("#modal-cancel").addEventListener("click", closeConfirmDelete);
      $("#modal-delete").addEventListener("click", performDelete);
      $("#modal-overlay").addEventListener("click", (e) => {
        if (e.target === $("#modal-overlay")) closeConfirmDelete();
      });
      // 編集モーダル
      $("#edit-cancel").addEventListener("click", closeEditModal);
      $("#edit-save").addEventListener("click", saveEditModal);
      $("#edit-overlay").addEventListener("click", (e) => {
        if (e.target === $("#edit-overlay")) closeEditModal();
      });
      // 子追加モーダル
      $("#child-cancel").addEventListener("click", closeChildModal);
      $("#child-save").addEventListener("click", saveChildModal);
      $("#child-overlay").addEventListener("click", (e) => {
        if (e.target === $("#child-overlay")) closeChildModal();
      });
      // モーダル Esc / Enter
      document.addEventListener("keydown", (e) => {
        if (!$("#modal-overlay").hidden) {
          if (e.key === "Escape") { e.preventDefault(); closeConfirmDelete(); return; }
          if (e.key === "Enter")  { e.preventDefault(); return; }
        }
        if (!$("#edit-overlay").hidden) {
          if (e.key === "Escape") { e.preventDefault(); closeEditModal(); return; }
        }
        if (!$("#child-overlay").hidden) {
          if (e.key === "Escape") { e.preventDefault(); closeChildModal(); return; }
        }
      });
      // 非表示トグル
      $("#show-hidden").addEventListener("change", (e) => {
        state.showHidden = e.target.checked;
        renderSettings();
      });
      // アコーディオン開閉
      for (const head of $$("[data-acc-head]")) {
        head.addEventListener("click", () => {
          const acc = head.closest(".accordion");
          acc.classList.toggle("open");
        });
      }
      // 設定タブ：追加欄ボタン
      for (const btn of $$('[data-add-btn]')) {
        btn.addEventListener("click", () => {
          const addRow = btn.closest("[data-add]");
          if (addRow) handleAddRow(addRow);
        });
      }
      // 設定タブ：行アクション delegation
      for (const list of $$("[data-list]")) {
        list.addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-act]");
          if (!btn) return;
          const li = btn.closest(".master-item");
          if (!li) return;
          handleMasterAction(li, btn.dataset.act);
        });
      }
      // 設定タブ：子追加ボタン（delegation・各 accordion-body）
      for (const body of $$(".accordion-body")) {
        body.addEventListener("click", (e) => {
          const btn = e.target.closest("button[data-child-add]");
          if (!btn) return;
          openChildModal(
            btn.dataset.col,
            btn.dataset.parent,
            { needsRatio: btn.hasAttribute("data-needs-ratio") }
          );
        });
      }
    }

    // ====== 伝票一覧クリック（イベントデリゲーション）======
    function bindListDelegation() {
      $("#list").addEventListener("click", (e) => {
        const row = e.target.closest(".tx-row");
        if (!row) return;
        const id = row.dataset.id;
        const tx = state.transactions.find(t => t.id === id);
        if (tx) enterEditMode(tx);
      });
    }

    // ====== IME / Enter ガード ======
    function bindIMEGuards() {
      document.addEventListener("compositionstart", () => { state.imeComposing = true; });
      document.addEventListener("compositionend",   () => { state.imeComposing = false; });
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        if (state.imeComposing) return;
        if (e.isComposing || e.keyCode === 229) return;
        const tag = (e.target && e.target.tagName) || "";
        if (tag === "INPUT") e.preventDefault();
      }, true);
    }

    // ====== bootstrap ======
    async function main() {
      try {
        subscribeMasters();          // live
        subscribeTransactions();     // live
        bindEvents();
        bindListDelegation();
        bindIMEGuards();
        resetForm();
        switchTab("input");
      } catch (e) {
        console.error(e);
        document.body.insertAdjacentHTML(
          "afterbegin",
          `<div class="boot-error">起動エラー: ${escapeHtml(e?.message || e)}</div>`
        );
      }
    }
    main();
  </script>
</body>
</html>
